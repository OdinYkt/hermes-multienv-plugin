name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Clone hermes-agent (test dependency)
        run: |
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git hermes-agent

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          # Install hermes-agent minimal deps for plugin imports
          pip install pyyaml rich prompt_toolkit

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/hermes-agent
          HERMES_HOME: /tmp/hermes-test-home
        run: |
          mkdir -p /tmp/hermes-test-home
          python -m pytest tests/ -v --tb=short
